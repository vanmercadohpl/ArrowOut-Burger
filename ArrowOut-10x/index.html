<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        /* background-color: white; */

        background-color: #fbfafe;
        /* background-color: rgb(41, 41, 41); */
        /* color: rgba(255, 255, 255, 0.87); */
        /* border: 2px solid red; */
      }

      #app {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        touch-action: none;
      }

      #ad-container {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
        touch-action: none;

        /* border: 2px solid red; */
      }

      #ad-container canvas {
        display: block;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100% !important;
        height: 100% !important;
        box-sizing: border-box;
        touch-action: none;
        /* border: 2vmin solid black; */
        /* border: 2px solid #00d1ff; */
      }
    </style>
    <title>Phaser - Playable Template</title>
  </head>
  <body>
    <div id="app">
      <div id="ad-container"></div>
    </div>
    <script type="module" crossorigin src="src/main.js"></script>
  </body>
</html>
